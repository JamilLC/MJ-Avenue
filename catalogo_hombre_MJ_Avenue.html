<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Avenue Exportaciones — Catálogo Hombre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15140f;
    --ink-soft:#2a271f;
    --gold:#b9862f;
    --gold-light:#e0ac52;
    --cream:#f6f2e9;
    --paper:#fbf8f2;
    --stone:#8c8474;
    --line:#e3dcc9;
    --white:#ffffff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none;}

  /* ---------- preview banner ---------- */
  .preview-banner{
    background:var(--ink);
    color:var(--gold-light);
    text-align:center;
    font-size:12px;
    letter-spacing:.08em;
    padding:9px 14px;
    text-transform:uppercase;
  }

  /* ---------- header / hero ---------- */
  header{
    background:
      radial-gradient(120% 140% at 50% -10%, #201d15 0%, var(--ink) 55%),
      var(--ink);
    color:var(--paper);
    padding:56px 24px 90px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:70px;
    background:var(--cream);
    clip-path: polygon(0 100%, 100% 100%, 100% 40%, 0 100%);
  }
  .logo-wrap{
    width:190px;
    margin:0 auto 18px;
  }
  .logo-wrap img{ width:100%; display:block; filter: drop-shadow(0 2px 10px rgba(0,0,0,.35)); }
  header .tagline{
    font-size:12.5px;
    letter-spacing:.32em;
    color:var(--gold-light);
    text-transform:uppercase;
    margin-top:4px;
  }
  .slash-rule{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:26px auto 6px;
  }
  .slash-rule span{
    width:44px; height:1px; background:var(--line-dark,#4a4636);
  }
  .slash-rule i{
    font-style:normal; color:var(--gold); font-size:15px; transform:rotate(12deg);
  }
  h1.section-title{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:34px;
    color:var(--paper);
    margin-top:10px;
  }
  h1.section-title em{
    font-style:normal; color:var(--gold-light);
  }
  header p.sub{
    max-width:480px;
    margin:14px auto 0;
    font-size:14px;
    line-height:1.7;
    color:#c9c3b3;
    font-weight:300;
  }

  /* ---------- category filters ---------- */
  .filters{
    max-width:980px;
    margin:-40px auto 0;
    padding:0 20px;
    position:relative;
    z-index:5;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
  }
  .filters button{
    font-family:'Jost', sans-serif;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink-soft);
    padding:11px 20px;
    font-size:12.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    border-radius:2px;
    cursor:pointer;
    transition:all .2s ease;
    box-shadow:0 4px 14px rgba(21,20,15,.06);
  }
  .filters button:hover{ border-color:var(--gold); color:var(--gold); }
  .filters button.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--gold-light);
  }

  /* ---------- grid ---------- */
  main{ max-width:1180px; margin:0 auto; padding:56px 24px 40px; }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(252px, 1fr));
    gap:26px;
  }
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 18px 34px rgba(21,20,15,.12);
  }
  .card-media{
    position:relative;
    background:
      linear-gradient(160deg, #efe9db 0%, #e4dcc7 100%);
    height:172px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card-media svg{ width:118px; height:auto; }
  .card-media .cat-tag{
    position:absolute; top:12px; left:12px;
    font-size:10px; letter-spacing:.1em;
    background:var(--ink); color:var(--gold-light);
    padding:4px 9px; text-transform:uppercase;
  }
  .card-media .photo-pending{
    position:absolute; bottom:10px; right:10px;
    font-size:9.5px; letter-spacing:.06em;
    color:var(--stone); text-transform:uppercase;
    background:rgba(255,255,255,.7);
    padding:3px 7px;
  }
  .card-body{ padding:18px 18px 20px; display:flex; flex-direction:column; gap:10px; flex:1; }
  .card-brand{
    font-size:10.5px; letter-spacing:.18em; color:var(--gold);
    text-transform:uppercase; font-weight:500;
  }
  .card-name{
    font-family:'Playfair Display', serif;
    font-size:18px; font-weight:600; color:var(--ink);
    line-height:1.3;
  }
  .card-color{
    display:flex; align-items:center; gap:7px;
    font-size:12px; color:var(--stone);
  }
  .dot{ width:11px; height:11px; border-radius:50%; border:1px solid rgba(0,0,0,.15); }
  .card-sizes{ font-size:11.5px; color:var(--stone); letter-spacing:.02em; }
  .card-sizes b{ color:var(--ink-soft); font-weight:500; }
  .card-footer{
    margin-top:auto;
    display:flex; align-items:center; justify-content:space-between;
    padding-top:12px; border-top:1px solid var(--line);
  }
  .price{ font-family:'Playfair Display', serif; font-size:17px; color:var(--ink); }
  .price small{ font-family:'Jost',sans-serif; font-size:9.5px; color:var(--stone); display:block; letter-spacing:.08em;}
  .wa-btn{
    display:flex; align-items:center; gap:7px;
    background:var(--ink); color:var(--paper);
    font-size:11.5px; letter-spacing:.06em; text-transform:uppercase;
    padding:10px 14px;
    border:1px solid var(--ink);
    transition:all .2s ease;
  }
  .wa-btn:hover{ background:var(--gold); border-color:var(--gold); color:var(--ink); }
  .wa-btn svg{ width:14px; height:14px; }

  footer{
    background:var(--ink); color:#a9a290;
    text-align:center; padding:34px 20px 30px;
    font-size:11.5px; letter-spacing:.08em;
  }
  footer .foot-logo{ color:var(--gold-light); font-family:'Playfair Display',serif; font-size:15px; letter-spacing:.1em; margin-bottom:6px;}

  @media(max-width:520px){
    h1.section-title{ font-size:26px; }
    .filters{ margin-top:-30px; }
  }
</style>
</head>

    <h1 class="section-title">Catálogo <em>Hombre</em></h1>
    <p class="sub">Zapatillas originales Adidas &amp; Puma. Elige tu modelo y talla, y arma tu pedido directo por WhatsApp.</p>
  </header>

  <div class="filters" id="filters"></div>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <div class="foot-logo">MJ AVENUE</div>
    Exportaciones · Huaraz, Perú
  </footer>

<script>
const WHATSAPP_NUMBER = "51999999999"; // ← reemplazar con el número real

const products = [
  {cat:"Tennis", brand:"Adidas", model:"OwnTheGame 3.0", color:"Blanco", hex:"#f4f2ec", price:189},
  {cat:"Tennis", brand:"Adidas", model:"OwnTheGame 3.0", color:"Negro", hex:"#1c1a16", price:189},
  {cat:"Basketball", brand:"Puma", model:"Shuffle Downtown", color:"Blanco", hex:"#f4f2ec", price:219},
  {cat:"Basketball", brand:"Puma", model:"Court Classic Clean", color:"Negro", hex:"#1c1a16", price:199},
  {cat:"Tennis", brand:"Adidas", model:"Predator Club TF", color:"Blanco", hex:"#f4f2ec", price:249},
  {cat:"Urban", brand:"Adidas", model:"Urban Court", color:"Negro", hex:"#1c1a16", price:179},
  {cat:"Running", brand:"Adidas", model:"Galaxy 7", color:"Blanco", hex:"#f4f2ec", price:169},
  {cat:"Fitness", brand:"Puma", model:"Skyrocket Lite Trail", color:"Gris claro", hex:"#c3bcae", price:229},
  {cat:"Tennis", brand:"Adidas", model:"Terrex Eastrail 3", color:"Negro", hex:"#1c1a16", price:259},
  {cat:"Basketball", brand:"Puma", model:"FTR Wave", color:"Negro", hex:"#1c1a16", price:209},
  {cat:"Tennis", brand:"Adidas", model:"Grand Court Alpha 00s", color:"Negro", hex:"#1c1a16", price:189},
  {cat:"Basketball", brand:"Puma", model:"Skyrocket Lite 2", color:"Azul", hex:"#33547e", price:219},
];

const shoeIcon = `<svg viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M6 42c0-6 4-9 9-11l19-8c4-2 6-6 10-9 4-3 9-4 13-2l24 11c6 3 9 6 9 12v4c0 4-3 7-7 7H13c-4 0-7-3-7-7v-2z" stroke="#15140f" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M6 42h84" stroke="#b9862f" stroke-width="2.2"/>
  <path d="M30 24l6 8M40 21l6 9M50 19l6 10" stroke="#15140f" stroke-width="1.6" stroke-linecap="round"/>
</svg>`;

const categories = ["Todos", ...Array.from(new Set(products.map(p=>p.cat)))];
const filtersEl = document.getElementById('filters');
const gridEl = document.getElementById('grid');

function waLink(model){
  const text = encodeURIComponent(`Hola MJ Avenue, quiero consultar por la zapatilla: ${model}`);
  return `https://wa.me/${WHATSAPP_NUMBER}?text=${text}`;
}

function render(list){
  gridEl.innerHTML = list.map(p => `
    <div class="card">
      <div class="card-media">
        <span class="cat-tag">${p.cat}</span>
        ${shoeIcon}
        <span class="photo-pending">Foto pendiente</span>
      </div>
      <div class="card-body">
        <div class="card-brand">${p.brand}</div>
        <div class="card-name">${p.model}</div>
        <div class="card-color"><span class="dot" style="background:${p.hex}"></span>${p.color}</div>
        <div class="card-sizes">Tallas: <b>38 – 44</b></div>
        <div class="card-footer">
          <div class="price">S/ ${p.price}<small>Precio ejemplo</small></div>
          <a class="wa-btn" href="${waLink(p.brand + ' ' + p.model + ' ' + p.color)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.36 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18a7.9 7.9 0 01-4.03-1.1l-.29-.17-3 .78.8-2.93-.19-.3A7.93 7.93 0 014 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8zm4.4-5.6c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.02-.38-1.94-1.2-.72-.64-1.2-1.44-1.34-1.68-.14-.24-.02-.37.1-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.2-.47-.4-.4-.54-.4h-.46c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.7 2.6 4.12 3.64.58.25 1.03.4 1.38.51.58.18 1.11.16 1.53.1.47-.07 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28z"/></svg>
            Pedir
          </a>
        </div>
      </div>
    </div>
  `).join('');
}

function renderFilters(){
  filtersEl.innerHTML = categories.map((c,i)=>`<button data-cat="${c}" class="${i===0?'active':''}">${c}</button>`).join('');
  filtersEl.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      filtersEl.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      render(cat==='Todos' ? products : products.filter(p=>p.cat===cat));
    });
  });
}

renderFilters();
render(products);
</script>
</body>
</html>
